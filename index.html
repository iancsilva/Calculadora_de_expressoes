<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="response.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="app">
    <section class="history-panel">
      <h2>Histórico</h2>
      <ul id="history-list" class="history-list"></ul>
    </section>

    <div class="calculator">
      <div class="display">
        <button class="history-btn" type="button">↺</button>
        <input type="text" class="screen" placeholder="0" readonly />
      </div>

      <div class="buttons">
        <button class="btn actions">C</button>
        <button class="btn actions">⌫</button>
        <button class="btn parentheses digit">( )</button>

        <button class="btn operatorsAndPoint digit">%</button>
        <button class="btn operatorsAndPoint digit">√</button>
        <button class="btn operatorsAndPoint digit">^</button>
        <button class="btn operatorsAndPoint digit">/</button>

        <button class="btn operatorsAndPoint digit">*</button>
        <button class="btn digit">7</button>
        <button class="btn digit">8</button>
        <button class="btn digit">9</button>

        <button class="btn operatorsAndPoint digit">-</button>
        <button class="btn digit">4</button>
        <button class="btn digit">5</button>
        <button class="btn digit">6</button>

        <button class="btn operatorsAndPoint digit">+</button>
        <button class="btn digit">1</button>
        <button class="btn digit">2</button>
        <button class="btn digit">3</button>

        <button class="btn operatorsAndPoint digit">.</button>
        <button class="btn zero digit">0</button>
        <button class="btn equal actions">=</button>
      </div>
    </div>
  </div>

</body>
</html>
